<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Object2 Blog</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/src/styles/styles.scss" />
    <script>
      (function() {
        try {
          var dark = localStorage.getItem('blog-theme-dark');
          var isDark = dark === 'dark' || (!dark && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
        } catch(e) {}
      })();
    </script>
    <script>
      (function() {
        try {
          var buildVersion = '__BUILD_VERSION__';
          var stored = localStorage.getItem('blog-build-version');
          if (stored && stored !== buildVersion) {
            localStorage.setItem('blog-build-version', buildVersion);
            location.reload();
          } else if (!stored) {
            localStorage.setItem('blog-build-version', buildVersion);
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
